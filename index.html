<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anatomy · Visor 3D de anatomía</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧠</text></svg>">
</head>
<body>
	

    <header class="header">
		<div class="container">
		<div class="btn-menu">
			<label for="btn-menu">☰</label>
		</div>
			<div class="logo">
				<h1>Anatomy</h1>
			</div>
			<nav class="menu">
				<div class="dropdown">
					<button class="dropbtn">Vistas ▾</button>
					<div class="dropdown-content">
					  <button id="axisBtn">Ejes</button>
					  <button id="upView">Arriba</button>
					  <button id="frontView">Frontal</button>
					  <button id="downView">Abajo</button>
					</div>
				  </div>
				<button id="toggleRaycaster" class="toggle-btn">Seleccionar</button>
				<button id="class1" class="toggle-btn">Clase 1</button>
				<button id="deselect">Deseleccionar</button>
				<button id="toggleDragDrop" class="toggle-btn">Arrastrar</button>
				<button id="toggleSelectedObjects">Seleccionados</button>
				<div id="selectedObjectsContainer"></div>
			</nav>
			<div class="slider-container">
				<input type="range" id="opacity-slider" min="0" max="100" value="100" />
				<span id="opacity-value">100%</span>
			  </div>
			
			  <div id="drag-label"></div>


		</div>
	</header>
	<!-- Barra de carga -->

	

	
    <input type="checkbox" id="btn-menu">
<div class="container-menu">
	<div class="cont-menu">
		<nav>
			
			<div id="botones-container"></div>
		</nav>
		<label for="btn-menu">✖️</label>
	</div>
</div>
<div class="circular">
	<div class="inner"></div>
	<div class="outer"></div>
	<div class="numb">
	   0%
	</div>
	<div class="circle">
	   <div class="bar left">
		  <div class="progress"></div>
	   </div>
	   <div class="bar right">
		  <div class="progress"></div>
	   </div>
	</div>
 </div>
    <script src="/src/main.js" type="module"></script>
</body>
</html>
